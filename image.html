<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDL OP 2 - Mind AR Roger That</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="./css/main.css">    
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 4" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights"
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false"
    >

        <a-assets>
            <a-asset-item id="explosie" src="./assets/uploads_files_2705643_Fireball.glb"></a-asset-item>
        </a-assets>
        <a-assets>
            <a-assets-item id="taco" src="./assets/uploads_files_5442055_cgt_fmcg_meal_seasoning_009.glb"></a-assets-item>
        </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex:0">
         <a-entity 
            gltf-model="#explosie"
            scale="1 1 1"
            position="0 0 0"
            rotation="0 0 0">
            </a-entity>
    </a-entity>

      <a-entity mindar-image-target="targetIndex:2">
        <a-entity 
            gltf-model="#explosie"
            scale="1 1 1"
            position="0 0 0"
            rotation="0 0 0">
            </a-entity>
    </a-entity>

      <a-entity mindar-image-target="targetIndex:1">
        <a-entity
            gltf-model="#taco"
             scale="50 50 50"
            position="0 0 0"
            rotation="90 90 90">
        </a-entity>
    </a-entity>
    </a-scene>

</body> 
</html>
